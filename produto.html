<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Produto</title>
</head>

<body>

    <div id="produto"></div>
    <script src="carrinho.js"></script>
    
   <script src="carrinho.js"></script>

<script>
const API = "http://localhost:3000";

const imagens = {
  1:"https://images.unsplash.com/photo-1518655048521-f130df041f66",
  2:"https://images.unsplash.com/photo-1508973375-3dcaed82a5c3",
  3:"https://images.unsplash.com/photo-1485965120184-e220f721d03e",
  4:"https://images.unsplash.com/photo-1595433562696-6f5f9f6c6c90",
  5:"https://images.unsplash.com/photo-1601233749202-95d04d5bcb2f",
  6:"https://images.unsplash.com/photo-1593766827228-8737b4534aa6"
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function carregarProduto(){
  const res = await fetch(API+"/produtos/"+id);
  const p = await res.json();

  document.body.innerHTML = `
    <h1>${p.nome}</h1>
    <img src="${imagens[p.id]}" width="300">
    <p>R$ ${p.preco}</p>
    <p>⭐ ⭐ ⭐ ⭐ ☆ (4.5)</p>

    <button onclick='addCarrinho(${JSON.stringify(p)})'>
      🛒 Adicionar ao carrinho
    </button>
  `;
}

carregarProduto();
</script>
   


</body>

</html>
